services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: planneros
      POSTGRES_PASSWORD: planneros
      POSTGRES_DB: planneros
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planneros"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./server
    restart: unless-stopped
    ports:
      - "1337:1337"
    environment:
      DATABASE_URL: postgresql://planneros:planneros@db:5432/planneros
      PORT: 1337
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
